<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Station — Thomaston, ME</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 6px;
      color: #ffffff;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 24px auto;
    }
    .card {
      background: #1a1d27;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      border: 1px solid #2a2d3a;
    }
    .card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 10px;
    }
    .card .value {
      font-size: 32px;
      font-weight: 300;
      color: #ffffff;
    }
    .card .unit {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .card.temp .value { color: #ff6b6b; }
    .card.humidity .value { color: #4ecdc4; }
    .card.pressure .value { color: #a8e6cf; }
    .card.uv .value { color: #ffd93d; }
    .card.wind .value { color: #6bcbff; }
    .card.rain .value { color: #74b9ff; }
    .section-title {
      text-align: center;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #444;
      margin-bottom: 16px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .status-bar {
      max-width: 900px;
      margin: 0 auto;
      background: #1a1d27;
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #2a2d3a;
      font-size: 12px;
      color: #666;
      flex-wrap: wrap;
      gap: 10px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.online { background: #00b894; }
    .last-updated {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>Weather Station</h1>
  <p class="subtitle">Thomaston, Maine</p>

  <p class="section-title">Current Conditions</p>

  <div class="grid">
    <div class="card temp">
      <div class="label">Temperature</div>
      <div class="value" id="temp">--</div>
      <div class="unit">°F</div>
    </div>
    <div class="card humidity">
      <div class="label">Humidity</div>
      <div class="value" id="humidity">--</div>
      <div class="unit">%</div>
    </div>
    <div class="card pressure">
      <div class="label">Pressure</div>
      <div class="value" id="pressure">--</div>
      <div class="unit">hPa</div>
    </div>
    <div class="card uv">
      <div class="label">UV Index</div>
      <div class="value" id="uv">--</div>
      <div class="unit">index</div>
    </div>
    <div class="card wind">
      <div class="label">Wind Speed</div>
      <div class="value" id="wind">--</div>
      <div class="unit">mph</div>
    </div>
    <div class="card wind">
      <div class="label">Wind Direction</div>
      <div class="value" id="winddir">--</div>
      <div class="unit">degrees</div>
    </div>
    <div class="card rain">
      <div class="label">Rainfall Today</div>
      <div class="value" id="rain">--</div>
      <div class="unit">mm</div>
    </div>
    <div class="card rain">
      <div class="label">Raining Now</div>
      <div class="value" id="raining">--</div>
      <div class="unit"></div>
    </div>
  </div>

  <p class="section-title">Station Status</p>

  <div class="status-bar">
    <span><span class="status-dot" id="dot"></span><span id="status-text">Connecting...</span></span>
    <span id="battery">Battery: --</span>
    <span id="signal">Signal: --</span>
    <span id="solar">Solar: --</span>
  </div>

  <p class="last-updated" id="updated">Last updated: never</p>

  <script>
    // ---- REPLACE THESE ----
    const channelID  = "3307817";
    const readAPIKey = "H9TY5CZFFGZIGNOX";
    // -----------------------

    function fetchData() {
      const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readAPIKey}`;
      
      fetch(url)
        .then(response => response.json())
        .then(data => {
          document.getElementById('temp').textContent     = parseFloat(data.field1).toFixed(1);
          document.getElementById('humidity').textContent = parseFloat(data.field2).toFixed(1);
          document.getElementById('pressure').textContent = parseFloat(data.field3).toFixed(1);
          document.getElementById('uv').textContent       = parseFloat(data.field4).toFixed(1);
          document.getElementById('wind').textContent     = parseFloat(data.field5).toFixed(1);
          document.getElementById('winddir').textContent  = parseFloat(data.field6).toFixed(0);
          document.getElementById('rain').textContent     = parseFloat(data.field7).toFixed(1);
          document.getElementById('raining').textContent  = data.field8 == 1 ? "Yes" : "No";

          // Update status
          document.getElementById('dot').classList.add('online');
          document.getElementById('status-text').textContent = "Online";

          // Update last updated time
          const time = new Date(data.created_at);
          document.getElementById('updated').textContent = "Last updated: " + time.toLocaleTimeString();
        })
        .catch(error => {
          document.getElementById('status-text').textContent = "Connection error";
          document.getElementById('dot').classList.remove('online');
          console.error('Error:', error);
        });
    }

    // Fetch immediately then every 30 seconds
    fetchData();
    setInterval(fetchData, 30000);
  </script>

</body>
</html>
